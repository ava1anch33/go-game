services:
  api:
    build:
      context: ./go-game-api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/gogame
      - API_KEY=comp7270_api_key
      - JWT_ACCESS_SECRET=your_very_long_random_access_secret_2026
      - JWT_REFRESH_SECRET=another_different_long_random_refresh_secret
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
    volumes:
      - ./go-game-api:/app     
      - backend_node_modules:/app/node_modules    
    depends_on:
      - mongo
    command: npm run dev
    networks:
      - app-net

  frontend:
    build:
      context: ./go-plus
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./go-plus:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev
    depends_on:
      - api
    networks:
      - app-net

  ionic-frontend:             # ai-go Ionic 前端
    build:
      context: ./ai-go
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    volumes:
      - ./ai-go:/app
      - ai_go_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://api:4000/api/v1
    command: npm run dev
    depends_on:
      - api
    networks:
      - app-net

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"   
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gogame
    networks:
      - app-net

volumes:
  mongo-data:
  frontend_node_modules:
  backend_node_modules:
  ai_go_node_modules:

networks:
  app-net:
    driver: bridge